version = 1
harness = "claude-code"

# ---- Zone configuration ----
[zone]
# CUDA 12.6 devel image: nvcc 12.6 pairs with Ubuntu 24.04's GCC 13 and supports sm_89 (RTX 4080).
base_image = "nvidia/cuda:12.6.3-devel-ubuntu24.04"
packages = ["git", "curl", "ripgrep", "build-essential", "cmake", "ninja-build",
            "zlib1g-dev", "python3", "gdb", "pkg-config"]

# ---- Resource limits ----
[resources]
gpus = "all"   # GPU passthrough: "all", a count like "2", or "device=0,1". Needs NVIDIA Container Toolkit.
# memory = "4g"
# cpus = "2"
# pids_limit = 512

# ---- Workspace settings ----
# [workspace]
# persist_home = true
# extra_mounts = ["./data:/mnt/data:ro"]
# ports = ["3000:3000"]

# ---- Authentication & environment ----
# [auth]
# forward_env = ["AWS_*", "GITHUB_TOKEN"]
# required_env = []
# forward_ssh_agent = false
# mount_home_config = true
# env_file = ""

# ---- Network settings ----
# Default (permissive) network is required: emi.nasdaq.com for ITCH day files,
# github for vendored deps, ubuntu mirrors for apt during image build.
# [network]
# mode = "none"
# allow = []
# deny = []

# ---- Hooks ----
# [hooks]
# pre_build = []
# post_stop = []

# ---- Harness-specific settings ----
# [harness]
# skip_permissions = false # dangerous permission bypass for supported harnesses
# api_key_env = "ANTHROPIC_API_KEY"
# model = ""
